<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic-Tac-Toe</title>
<style>
    
    #board{
        display: grid;
        grid-template-columns: 50px 50px 50px;
        grid-template-rows: 50px 50px 50px;
        margin: 30px auto;
    }
    .cell{
        width: 52px;
        height: 52px;
        border: 1px solid black;
        font-size: 24px;
        cursor: pointer;
    }
    #status{
        margin-top: 20px;
    }
    #reset{
        margin-top: 10px;
    }
</style>
</head>
<body>

<h2>Tic-Tac-Toe</h2>

<div id="board"></div>
<div id="status">Current Player: X</div>
<button id="reset">Reset</button>

<script>
let boardDiv=document.getElementById("board");
let statusDiv=document.getElementById("status");
let resetBtn=document.getElementById("reset");

let board=["","","","","","","","",""];
let player="X";
let over=false;

for(let i=0; i<9; i++){
    let cell=document.createElement("div");
    cell.className="cell";
    cell.setAttribute("data", i);
    boardDiv.appendChild(cell);

    cell.addEventListener("click", function(){
        let index=this.getAttribute("data");
        if(board[index]=="" && !over){
            board[index]=player;
            this.textContent=player;

            let win=[
                [0,1,2],[3,4,5],[6,7,8],
                [0,3,6],[1,4,7],[2,5,8],
                [0,4,8],[2,4,6]
            ];
            let won=false;
            for(let w of win){
                let a=board[w[0]];
                let b=board[w[1]];
                let c=board[w[2]];
                if(a!="" && a==b && b==c){
                    won=true;
                    break;
                }
            }

            if(won){
                statusDiv.textContent="Winner: "+player;
                over=true;
                return;
            }

            if(!board.includes("")){
                statusDiv.textContent="It's a Draw!";
                over=true;
                return;
            }

            player=player=="X"?"O":"X";
            statusDiv.textContent="Current Player: "+player;
        }
    });
}

resetBtn.addEventListener("click", function(){
    board=["","","","","","","","",""];
    player="X";
    over=false;
    statusDiv.textContent="Current Player: X";
    let cells=document.getElementsByClassName("cell");
    for(let i=0; i<cells.length; i++){
        cells[i].textContent="";
    }
});
</script>

</body>
</html>
